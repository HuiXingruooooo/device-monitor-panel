<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>贪吃蛇游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            font-family: 'Arial', sans-serif;
            color: white;
        }

        .game-container {
            background: rgba(0, 0, 0, 0.5);
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        h1 {
            text-align: center;
            margin-bottom: 20px;
            font-size: 2.5em;
            text-shadow: 0 0 10px #00ff88;
            color: #00ff88;
        }

        .score-board {
            display: flex;
            justify-content: space-around;
            margin-bottom: 20px;
            font-size: 1.2em;
        }

        .score, .high-score {
            background: rgba(0, 255, 136, 0.1);
            border: 2px solid #00ff88;
            color: #00ff88;
            padding: 10px 25px;
            border-radius: 10px;
            font-weight: bold;
        }

        canvas {
            display: block;
            margin: 0 auto;
            border: 3px solid #00ff88;
            border-radius: 10px;
            background: #0a0a0a;
            box-shadow: 0 0 20px rgba(0, 255, 136, 0.3);
        }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        button {
            background: linear-gradient(135deg, #00ff88, #00cc6a);
            color: #1a1a2e;
            border: none;
            padding: 12px 30px;
            font-size: 1.1em;
            border-radius: 25px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
            font-weight: bold;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(0, 255, 136, 0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .instructions {
            margin-top: 15px;
            color: #888;
            font-size: 0.9em;
            text-align: center;
        }

        .game-over {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            background: rgba(0, 0, 0, 0.95);
            border: 3px solid #ff4444;
            padding: 40px;
            border-radius: 20px;
            text-align: center;
            display: none;
            z-index: 10;
            box-shadow: 0 0 30px rgba(255, 68, 68, 0.5);
        }

        .game-over.active {
            display: block;
        }

        .game-over h2 {
            font-size: 2.5em;
            margin-bottom: 20px;
            color: #ff4444;
            text-shadow: 0 0 10px #ff4444;
        }

        .game-over p {
            font-size: 1.3em;
            margin-bottom: 20px;
            color: #00ff88;
        }

        .speed-control {
            margin-top: 15px;
            display: flex;
            align-items: center;
            gap: 15px;
            justify-content: center;
        }

        .speed-label {
            font-size: 0.9em;
            color: #888;
        }

        .speed-slider {
            width: 150px;
            accent-color: #00ff88;
        }

        .speed-value {
            color: #00ff88;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>🐍 贪吃蛇</h1>
        <div class="score-board">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="high-score">最高分: <span id="highScore">0</span></div>
        </div>
        
        <div class="speed-control">
            <span class="speed-label">速度:</span>
            <input type="range" class="speed-slider" id="speedSlider" min="50" max="150" value="100">
            <span class="speed-value" id="speedValue">100ms</span>
        </div>
        
        <canvas id="gameCanvas" width="400" height="400"></canvas>
        
        <div class="controls">
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
            <button id="resetBtn">重置</button>
        </div>
        
        <div class="instructions">
            使用方向键 ↑ ↓ ← → 或 W A S D 控制蛇的移动
        </div>
    </div>

    <div class="game-over" id="gameOver">
        <h2>游戏结束!</h2>
        <p>你的得分: <span id="finalScore">0</span></p>
        <button id="restartBtn">重新开始</button>
    </div>

    <script>
        const canvas = document.getElementById('gameCanvas');
        const ctx = canvas.getContext('2d');
        const scoreElement = document.getElementById('score');
        const highScoreElement = document.getElementById('highScore');
        const gameOverElement = document.getElementById('gameOver');
        const finalScoreElement = document.getElementById('finalScore');
        const startBtn = document.getElementById('startBtn');
        const pauseBtn = document.getElementById('pauseBtn');
        const resetBtn = document.getElementById('resetBtn');
        const restartBtn = document.getElementById('restartBtn');
        const speedSlider = document.getElementById('speedSlider');
        const speedValue = document.getElementById('speedValue');

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let snake = [];
        let food = {};
        let dx = 1;
        let dy = 0;
        let score = 0;
        let highScore = localStorage.getItem('snakeHighScore') || 0;
        let gameLoop = null;
        let isPaused = false;
        let isGameRunning = false;
        let speed = 100;

        highScoreElement.textContent = highScore;

        speedSlider.addEventListener('input', () => {
            speed = parseInt(speedSlider.value);
            speedValue.textContent = speed + 'ms';
            if (isGameRunning && !isPaused) {
                clearInterval(gameLoop);
                gameLoop = setInterval(update, speed);
            }
        });

        function initGame() {
            snake = [
                { x: 10, y: 10 },
                { x: 9, y: 10 },
                { x: 8, y: 10 }
            ];
            dx = 1;
            dy = 0;
            score = 0;
            scoreElement.textContent = score;
            generateFood();
            gameOverElement.classList.remove('active');
        }

        function generateFood() {
            food = {
                x: Math.floor(Math.random() * tileCount),
                y: Math.floor(Math.random() * tileCount)
            };
            for (let segment of snake) {
                if (segment.x === food.x && segment.y === food.y) {
                    generateFood();
                    return;
                }
            }
        }

        function draw() {
            // 清空画布
            ctx.fillStyle = '#0a0a0a';
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // 绘制网格
            ctx.strokeStyle = 'rgba(0, 255, 136, 0.1)';
            ctx.lineWidth = 0.5;
            for (let i = 0; i <= tileCount; i++) {
                ctx.beginPath();
                ctx.moveTo(i * gridSize, 0);
                ctx.lineTo(i * gridSize, canvas.height);
                ctx.stroke();
                ctx.beginPath();
                ctx.moveTo(0, i * gridSize);
                ctx.lineTo(canvas.width, i * gridSize);
                ctx.stroke();
            }

            // 绘制食物
            const foodGradient = ctx.createRadialGradient(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                0,
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2
            );
            foodGradient.addColorStop(0, '#ff6b6b');
            foodGradient.addColorStop(1, '#ee5a5a');
            ctx.fillStyle = foodGradient;
            ctx.beginPath();
            ctx.arc(
                food.x * gridSize + gridSize / 2,
                food.y * gridSize + gridSize / 2,
                gridSize / 2 - 2,
                0,
                Math.PI * 2
            );
            ctx.fill();

            // 绘制蛇
            snake.forEach((segment, index) => {
                const gradient = ctx.createRadialGradient(
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    0,
                    segment.x * gridSize + gridSize / 2,
                    segment.y * gridSize + gridSize / 2,
                    gridSize / 2
                );
                
                if (index === 0) {
                    gradient.addColorStop(0, '#00ff88');
                    gradient.addColorStop(1, '#00cc6a');
                } else {
                    const brightness = Math.max(0.3, 1 - index * 0.05);
                    gradient.addColorStop(0, `rgba(0, 255, 136, ${brightness})`);
                    gradient.addColorStop(1, `rgba(0, 204, 106, ${brightness})`);
                }
                
                ctx.fillStyle = gradient;
                ctx.beginPath();
                ctx.roundRect(
                    segment.x * gridSize + 1,
                    segment.y * gridSize + 1,
                    gridSize - 2,
                    gridSize - 2,
                    5
                );
                ctx.fill();

                // 绘制蛇头眼睛
                if (index === 0) {
                    ctx.fillStyle = 'white';
                    const eyeOffset = gridSize / 4;
                    const eyeSize = 3;
                    
                    let eye1X, eye1Y, eye2X, eye2Y;
                    if (dx === 1) {
                        eye1X = segment.x * gridSize + gridSize - 6;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + gridSize - 6;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset - eyeSize;
                    } else if (dx === -1) {
                        eye1X = segment.x * gridSize + 4;
                        eye1Y = segment.y * gridSize + eyeOffset;
                        eye2X = segment.x * gridSize + 4;
                        eye2Y = segment.y * gridSize + gridSize - eyeOffset - eyeSize;
                    } else if (dy === -1) {
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + 4;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset - eyeSize;
                        eye2Y = segment.y * gridSize + 4;
                    } else {
                        eye1X = segment.x * gridSize + eyeOffset;
                        eye1Y = segment.y * gridSize + gridSize - 6;
                        eye2X = segment.x * gridSize + gridSize - eyeOffset - eyeSize;
                        eye2Y = segment.y * gridSize + gridSize - 6;
                    }
                    
                    ctx.beginPath();
                    ctx.arc(eye1X, eye1Y, eyeSize, 0, Math.PI * 2);
                    ctx.arc(eye2X, eye2Y, eyeSize, 0, Math.PI * 2);
                    ctx.fill();
                }
            });
        }

        function update() {
            if (isPaused) return;

            const head = { x: snake[0].x + dx, y: snake[0].y + dy };

            if (head.x < 0 || head.x >= tileCount || head.y < 0 || head.y >= tileCount) {
                gameOver();
                return;
            }

            for (let segment of snake) {
                if (head.x === segment.x && head.y === segment.y) {
                    gameOver();
                    return;
                }
            }

            snake.unshift(head);

            if (head.x === food.x && head.y === food.y) {
                score += 10;
                scoreElement.textContent = score;
                if (score > highScore) {
                    highScore = score;
                    highScoreElement.textContent = highScore;
                    localStorage.setItem('snakeHighScore', highScore);
                }
                generateFood();
            } else {
                snake.pop();
            }

            draw();
        }

        function gameOver() {
            isGameRunning = false;
            clearInterval(gameLoop);
            finalScoreElement.textContent = score;
            gameOverElement.classList.add('active');
        }

        function startGame() {
            if (isGameRunning) return;
            isGameRunning = true;
            isPaused = false;
            pauseBtn.textContent = '暂停';
            initGame();
            draw();
            gameLoop = setInterval(update, speed);
        }

        function togglePause() {
            if (!isGameRunning) return;
            isPaused = !isPaused;
            pauseBtn.textContent = isPaused ? '继续' : '暂停';
        }

        function resetGame() {
            isGameRunning = false;
            isPaused = false;
            pauseBtn.textContent = '暂停';
            clearInterval(gameLoop);
            initGame();
            draw();
        }

        document.addEventListener('keydown', (e) => {
            if (!isGameRunning) return;
            
            switch (e.key) {
                case 'ArrowUp':
                case 'w':
                case 'W':
                    if (dy !== 1) { dx = 0; dy = -1; }
                    break;
                case 'ArrowDown':
                case 's':
                case 'S':
                    if (dy !== -1) { dx = 0; dy = 1; }
                    break;
                case 'ArrowLeft':
                case 'a':
                case 'A':
                    if (dx !== 1) { dx = -1; dy = 0; }
                    break;
                case 'ArrowRight':
                case 'd':
                case 'D':
                    if (dx !== -1) { dx = 1; dy = 0; }
                    break;
                case ' ':
                    togglePause();
                    break;
            }
        });

        startBtn.addEventListener('click', startGame);
        pauseBtn.addEventListener('click', togglePause);
        resetBtn.addEventListener('click', resetGame);
        restartBtn.addEventListener('click', startGame);

        initGame();
        draw();
    </script>
</body>
</html>
