<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>2048 游戏</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            background: linear-gradient(135deg, #f5f7fa 0%, #c3cfe2 100%);
            font-family: 'Arial', sans-serif;
        }

        .game-container {
            background: white;
            border-radius: 20px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
        }

        h1 {
            text-align: center;
            color: #776e65;
            margin-bottom: 20px;
            font-size: 3em;
            font-weight: bold;
        }

        .score-board {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
        }

        .score-box {
            background: #bbada0;
            color: white;
            padding: 10px 25px;
            border-radius: 8px;
            text-align: center;
            min-width: 100px;
        }

        .score-label {
            font-size: 0.8em;
            text-transform: uppercase;
            opacity: 0.8;
        }

        .score-value {
            font-size: 1.5em;
            font-weight: bold;
        }

        .grid-container {
            background: #bbada0;
            border-radius: 10px;
            padding: 15px;
            position: relative;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
            position: relative;
        }

        .cell {
            width: 100px;
            height: 100px;
            background: rgba(238, 228, 218, 0.35);
            border-radius: 8px;
        }

        .tiles-container {
            position: absolute;
            top: 15px;
            left: 15px;
            right: 15px;
            bottom: 15px;
        }

        .tile {
            position: absolute;
            width: 100px;
            height: 100px;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 2em;
            transition: all 0.15s ease-in-out;
        }

        .tile-2 { background: #eee4da; color: #776e65; }
        .tile-4 { background: #ede0c8; color: #776e65; }
        .tile-8 { background: #f2b179; color: #f9f6f2; }
        .tile-16 { background: #f59563; color: #f9f6f2; }
        .tile-32 { background: #f67c5f; color: #f9f6f2; }
        .tile-64 { background: #f65e3b; color: #f9f6f2; }
        .tile-128 { background: #edcf72; color: #f9f6f2; font-size: 1.8em; }
        .tile-256 { background: #edcc61; color: #f9f6f2; font-size: 1.8em; }
        .tile-512 { background: #edc850; color: #f9f6f2; font-size: 1.8em; }
        .tile-1024 { background: #edc53f; color: #f9f6f2; font-size: 1.5em; }
        .tile-2048 { background: #edc22e; color: #f9f6f2; font-size: 1.5em; }
        .tile-super { background: #3c3a32; color: #f9f6f2; font-size: 1.2em; }

        .controls {
            margin-top: 20px;
            text-align: center;
        }

        button {
            background: #8f7a66;
            color: white;
            border: none;
            padding: 12px 30px;
            font-size: 1em;
            border-radius: 8px;
            cursor: pointer;
            transition: all 0.2s;
            margin: 5px;
            font-weight: bold;
        }

        button:hover {
            background: #9f8b77;
            transform: translateY(-2px);
        }

        .instructions {
            margin-top: 15px;
            color: #776e65;
            font-size: 0.9em;
            text-align: center;
        }

        .game-message {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(238, 228, 218, 0.73);
            border-radius: 10px;
            display: none;
            align-items: center;
            justify-content: center;
            flex-direction: column;
            z-index: 100;
        }

        .game-message.active {
            display: flex;
        }

        .game-message.game-won {
            background: rgba(237, 194, 46, 0.5);
        }

        .game-message h2 {
            font-size: 2.5em;
            color: #776e65;
            margin-bottom: 20px;
        }

        .game-message.game-won h2 {
            color: #f9f6f2;
        }

        @keyframes appear {
            0% { transform: scale(0); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .tile-new {
            animation: appear 0.2s ease-in-out;
        }

        @keyframes pop {
            0% { transform: scale(1); }
            50% { transform: scale(1.2); }
            100% { transform: scale(1); }
        }

        .tile-merged {
            animation: pop 0.2s ease-in-out;
        }
    </style>
</head>
<body>
    <div class="game-container">
        <h1>2048</h1>
        <div class="score-board">
            <div class="score-box">
                <div class="score-label">得分</div>
                <div class="score-value" id="score">0</div>
            </div>
            <div class="score-box">
                <div class="score-label">最高分</div>
                <div class="score-value" id="bestScore">0</div>
            </div>
        </div>
        
        <div class="grid-container">
            <div class="grid">
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
                <div class="cell"></div>
            </div>
            <div class="tiles-container" id="tilesContainer"></div>
            
            <div class="game-message" id="gameMessage">
                <h2 id="messageText">游戏结束!</h2>
                <button id="retryBtn">再试一次</button>
                <button id="continueBtn" style="display: none;">继续游戏</button>
            </div>
        </div>
        
        <div class="controls">
            <button id="newGameBtn">新游戏</button>
        </div>
        
        <div class="instructions">
            使用方向键 ↑ ↓ ← → 或 W A S D 移动方块
        </div>
    </div>

    <script>
        class Game2048 {
            constructor() {
                this.size = 4;
                this.grid = [];
                this.score = 0;
                this.bestScore = parseInt(localStorage.getItem('bestScore2048')) || 0;
                this.gameOver = false;
                this.gameWon = false;
                this.keepPlaying = false;
                
                this.tilesContainer = document.getElementById('tilesContainer');
                this.scoreElement = document.getElementById('score');
                this.bestScoreElement = document.getElementById('bestScore');
                this.gameMessage = document.getElementById('gameMessage');
                this.messageText = document.getElementById('messageText');
                this.retryBtn = document.getElementById('retryBtn');
                this.continueBtn = document.getElementById('continueBtn');
                this.newGameBtn = document.getElementById('newGameBtn');
                
                this.init();
                this.setupEventListeners();
            }

            init() {
                this.grid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                this.score = 0;
                this.gameOver = false;
                this.gameWon = false;
                this.keepPlaying = false;
                this.updateScore();
                this.bestScoreElement.textContent = this.bestScore;
                this.gameMessage.classList.remove('active', 'game-won');
                this.continueBtn.style.display = 'none';
                this.tilesContainer.innerHTML = '';
                
                this.addRandomTile();
                this.addRandomTile();
                this.render();
            }

            setupEventListeners() {
                document.addEventListener('keydown', (e) => {
                    if (this.gameOver && !this.keepPlaying) return;
                    
                    const keyMap = {
                        'ArrowUp': 'up',
                        'ArrowDown': 'down',
                        'ArrowLeft': 'left',
                        'ArrowRight': 'right',
                        'w': 'up',
                        'W': 'up',
                        's': 'down',
                        'S': 'down',
                        'a': 'left',
                        'A': 'left',
                        'd': 'right',
                        'D': 'right'
                    };
                    
                    if (keyMap[e.key]) {
                        e.preventDefault();
                        this.move(keyMap[e.key]);
                    }
                });

                this.retryBtn.addEventListener('click', () => this.init());
                this.newGameBtn.addEventListener('click', () => this.init());
                this.continueBtn.addEventListener('click', () => {
                    this.keepPlaying = true;
                    this.gameMessage.classList.remove('active');
                });

                // 触摸支持
                let touchStartX, touchStartY;
                const gameContainer = document.querySelector('.grid-container');
                
                gameContainer.addEventListener('touchstart', (e) => {
                    touchStartX = e.touches[0].clientX;
                    touchStartY = e.touches[0].clientY;
                });

                gameContainer.addEventListener('touchend', (e) => {
                    if (this.gameOver && !this.keepPlaying) return;
                    
                    const touchEndX = e.changedTouches[0].clientX;
                    const touchEndY = e.changedTouches[0].clientY;
                    
                    const dx = touchEndX - touchStartX;
                    const dy = touchEndY - touchStartY;
                    
                    const absDx = Math.abs(dx);
                    const absDy = Math.abs(dy);
                    
                    if (Math.max(absDx, absDy) > 30) {
                        if (absDx > absDy) {
                            this.move(dx > 0 ? 'right' : 'left');
                        } else {
                            this.move(dy > 0 ? 'down' : 'up');
                        }
                    }
                });
            }

            addRandomTile() {
                const emptyCells = [];
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 0) {
                            emptyCells.push({ row: i, col: j });
                        }
                    }
                }
                
                if (emptyCells.length > 0) {
                    const { row, col } = emptyCells[Math.floor(Math.random() * emptyCells.length)];
                    this.grid[row][col] = Math.random() < 0.9 ? 2 : 4;
                    return { row, col };
                }
                return null;
            }

            move(direction) {
                const previousGrid = JSON.stringify(this.grid);
                let moved = false;
                
                const rotateGrid = (grid, times) => {
                    let result = grid;
                    for (let t = 0; t < times; t++) {
                        const newGrid = Array(this.size).fill(null).map(() => Array(this.size).fill(0));
                        for (let i = 0; i < this.size; i++) {
                            for (let j = 0; j < this.size; j++) {
                                newGrid[j][this.size - 1 - i] = result[i][j];
                            }
                        }
                        result = newGrid;
                    }
                    return result;
                };

                const rotations = { 'up': 0, 'right': 3, 'down': 2, 'left': 1 };
                const inverseRotations = { 'up': 0, 'right': 1, 'down': 2, 'left': 3 };
                
                let grid = rotateGrid(this.grid, rotations[direction]);
                
                // 向上移动
                for (let col = 0; col < this.size; col++) {
                    let column = [];
                    for (let row = 0; row < this.size; row++) {
                        if (grid[row][col] !== 0) {
                            column.push(grid[row][col]);
                        }
                    }
                    
                    // 合并相同的数字
                    for (let i = 0; i < column.length - 1; i++) {
                        if (column[i] === column[i + 1]) {
                            column[i] *= 2;
                            this.score += column[i];
                            column.splice(i + 1, 1);
                            
                            if (column[i] === 2048 && !this.gameWon && !this.keepPlaying) {
                                this.gameWon = true;
                            }
                        }
                    }
                    
                    // 填充空位
                    while (column.length < this.size) {
                        column.push(0);
                    }
                    
                    for (let row = 0; row < this.size; row++) {
                        grid[row][col] = column[row];
                    }
                }
                
                this.grid = rotateGrid(grid, inverseRotations[direction]);
                
                if (JSON.stringify(this.grid) !== previousGrid) {
                    moved = true;
                    const newTile = this.addRandomTile();
                    this.render(newTile);
                    this.updateScore();
                    
                    if (this.gameWon && !this.keepPlaying) {
                        this.showMessage('你赢了!', true);
                    } else if (this.isGameOver()) {
                        this.gameOver = true;
                        this.showMessage('游戏结束!', false);
                    }
                }
            }

            isGameOver() {
                // 检查是否有空格
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        if (this.grid[i][j] === 0) return false;
                    }
                }
                
                // 检查是否可以合并
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const current = this.grid[i][j];
                        if (i < this.size - 1 && this.grid[i + 1][j] === current) return false;
                        if (j < this.size - 1 && this.grid[i][j + 1] === current) return false;
                    }
                }
                
                return true;
            }

            render(newTilePos = null) {
                this.tilesContainer.innerHTML = '';
                
                for (let i = 0; i < this.size; i++) {
                    for (let j = 0; j < this.size; j++) {
                        const value = this.grid[i][j];
                        if (value !== 0) {
                            const tile = document.createElement('div');
                            const tileClass = value <= 2048 ? `tile-${value}` : 'tile-super';
                            tile.className = `tile ${tileClass}`;
                            tile.textContent = value;
                            
                            const x = j * 115;
                            const y = i * 115;
                            tile.style.transform = `translate(${x}px, ${y}px)`;
                            
                            if (newTilePos && newTilePos.row === i && newTilePos.col === j) {
                                tile.classList.add('tile-new');
                            }
                            
                            this.tilesContainer.appendChild(tile);
                        }
                    }
                }
            }

            updateScore() {
                this.scoreElement.textContent = this.score;
                if (this.score > this.bestScore) {
                    this.bestScore = this.score;
                    this.bestScoreElement.textContent = this.bestScore;
                    localStorage.setItem('bestScore2048', this.bestScore);
                }
            }

            showMessage(text, isWin) {
                this.messageText.textContent = text;
                this.gameMessage.classList.add('active');
                if (isWin) {
                    this.gameMessage.classList.add('game-won');
                    this.continueBtn.style.display = 'inline-block';
                } else {
                    this.gameMessage.classList.remove('game-won');
                    this.continueBtn.style.display = 'none';
                }
            }
        }

        // 启动游戏
        const game = new Game2048();
    </script>
</body>
</html>
